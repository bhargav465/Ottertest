name: Deploy to AWS

# Manual, on-demand deploy. Run it from the GitHub "Actions" tab →
# "Deploy to AWS" → "Run workflow". Requires the repository variable
# AWS_DEPLOY_ROLE_ARN (see docs/AWS_OIDC_SETUP.md).
on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region to deploy to
        required: true
        default: us-east-1

permissions:
  id-token: write # required to request the OIDC token
  contents: read

jobs:
  deploy:
    name: Deploy Ottertest stack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify deploy role is configured
        run: |
          if [ -z "${{ vars.AWS_DEPLOY_ROLE_ARN }}" ]; then
            echo "::error::Repository variable AWS_DEPLOY_ROLE_ARN is not set."
            echo "::error::Follow docs/AWS_OIDC_SETUP.md to create the role, then add the variable."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}
          role-session-name: ottertest-deploy

      - name: Install infra dependencies
        working-directory: infra
        run: npm ci

      - name: Bootstrap CDK (idempotent)
        working-directory: infra
        run: npx cdk bootstrap

      - name: Deploy stack
        working-directory: infra
        env:
          # Transcription (Deepgram) and summaries (Groq) API keys — add each as
          # a repo secret. GROQ_API_KEY is optional (transcription-only if unset).
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: npx cdk deploy --require-approval never --outputs-file cdk-outputs.json

      - name: Publish outputs to job summary
        id: out
        working-directory: infra
        run: |
          echo "api=$(jq -r '.OttertestStack.ApiUrl' cdk-outputs.json)" >> "$GITHUB_OUTPUT"
          {
            echo "## 🦦 Ottertest deployed"
            echo ""
            echo "| Output | Value |"
            echo "|--------|-------|"
            jq -r '.OttertestStack | to_entries[] | "| \(.key) | `\(.value)` |"' cdk-outputs.json
            echo ""
            echo "Paste these into \`frontend/.env\` to run the web app."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke test API (expect 401 without auth)
        run: |
          API="${{ steps.out.outputs.api }}"
          echo "Checking $API/meetings ..."
          code=$(curl -s -o /dev/null -w '%{http_code}' "$API/meetings")
          echo "HTTP $code"
          if [ "$code" = "401" ] || [ "$code" = "403" ]; then
            echo "✅ API is live and rejects unauthenticated requests as expected."
          else
            echo "::warning::Got HTTP $code (expected 401/403). The stack deployed, but double-check the API."
          fi

      - name: Build frontend bundle
        working-directory: frontend
        run: |
          {
            echo "VITE_AWS_REGION=${{ inputs.aws_region }}"
            echo "VITE_API_URL=$(jq -r '.OttertestStack.ApiUrl' ../infra/cdk-outputs.json)"
            echo "VITE_USER_POOL_ID=$(jq -r '.OttertestStack.UserPoolId' ../infra/cdk-outputs.json)"
            echo "VITE_USER_POOL_CLIENT_ID=$(jq -r '.OttertestStack.UserPoolClientId' ../infra/cdk-outputs.json)"
          } > .env
          npm ci
          npm run build

      - name: Publish site to S3 + CloudFront
        working-directory: infra
        run: |
          SITE_BUCKET=$(jq -r '.OttertestStack.SiteBucketName' cdk-outputs.json)
          DIST_ID=$(jq -r '.OttertestStack.DistributionId' cdk-outputs.json)
          echo "Syncing to s3://$SITE_BUCKET ..."
          # Long-cache the fingerprinted assets, but always revalidate index.html.
          aws s3 sync ../frontend/dist "s3://$SITE_BUCKET" --delete \
            --exclude index.html --cache-control "public,max-age=31536000,immutable"
          aws s3 cp ../frontend/dist/index.html "s3://$SITE_BUCKET/index.html" \
            --cache-control "no-cache"
          # PWA service worker + manifest must revalidate so app updates ship.
          for f in sw.js registerSW.js manifest.webmanifest; do
            [ -f "../frontend/dist/$f" ] && aws s3 cp "../frontend/dist/$f" \
              "s3://$SITE_BUCKET/$f" --cache-control "no-cache" || true
          done
          echo "Invalidating CloudFront $DIST_ID ..."
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*" >/dev/null
          echo "SITE_URL=$(jq -r '.OttertestStack.SiteUrl' cdk-outputs.json)" >> "$GITHUB_ENV"

      - name: Announce site URL
        run: |
          {
            echo "### 🌐 Web app is live"
            echo ""
            echo "**$SITE_URL**"
            echo ""
            echo "Sign up with your email to start recording. (CloudFront can take"
            echo "a few minutes to finish propagating on the very first deploy.)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload frontend bundle
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 14
