name: Build Android app (TWA)

# Manually build a Trusted Web Activity wrapper of the PWA into an Android App
# Bundle (.aab) you can upload to the Play Console. Run from Actions →
# "Build Android app (TWA)" → Run workflow. The .aab/.apk are attached as build
# artifacts. See docs/PLAY_STORE.md for the full submission walkthrough.
#
# Signing: add repo secrets ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD,
# ANDROID_KEY_PASSWORD to sign with your real upload key. Without them, a
# throwaway PREVIEW keystore is generated (fine for installing on a test device,
# NOT for Play upload — Play requires a stable signing key).
on:
  workflow_dispatch:
    inputs:
      version_name:
        description: App version name (e.g. 1.0.0)
        default: "1.0.0"
      version_code:
        description: Integer version code (increment every upload)
        default: "1"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Set version
        working-directory: android
        run: |
          node -e '
            const fs=require("fs");
            const m=JSON.parse(fs.readFileSync("twa-manifest.json","utf8"));
            m.appVersionName="${{ inputs.version_name }}";
            m.appVersion="${{ inputs.version_name }}";
            m.appVersionCode=parseInt("${{ inputs.version_code }}",10);
            fs.writeFileSync("twa-manifest.json",JSON.stringify(m,null,2));
          '

      - name: Prepare signing keystore
        working-directory: android
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 -d > android.keystore
            echo "Using keystore from ANDROID_KEYSTORE_BASE64 secret."
          else
            echo "::warning::No ANDROID_KEYSTORE_BASE64 secret set — generating a PREVIEW keystore. Do NOT upload this build to Play; add your real keystore secret first."
            keytool -genkeypair -v -keystore android.keystore -alias ottertest \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass ottertest -keypass ottertest \
              -dname "CN=Ottertest, OU=Dev, O=Ottertest, L=NA, S=NA, C=US"
          fi

      - name: Point Bubblewrap at the runner's JDK + Android SDK
        run: |
          # The runner ships a fully-provisioned, licensed Android SDK. Use it
          # (and the setup-java JDK) instead of letting Bubblewrap download its
          # own, which fails to load SDK components under Gradle.
          mkdir -p ~/.bubblewrap
          printf '{ "jdkPath": "%s", "androidSdkPath": "%s" }\n' "$JAVA_HOME" "$ANDROID_SDK_ROOT" > ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json
          SDKMGR="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMGR" --licenses >/dev/null 2>&1 || true
          "$SDKMGR" "platform-tools" "platforms;android-33" "platforms;android-34" "platforms;android-35" "build-tools;34.0.0" "build-tools;35.0.0" >/dev/null 2>&1 || true

      - name: Build .aab and .apk
        working-directory: android
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'ottertest' }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || 'ottertest' }}
        run: |
          bubblewrap build --skipPwaValidation
          echo "--- artifacts ---"; ls -la *.aab *.apk 2>/dev/null || true

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ottertest-android
          path: |
            android/app-release-bundle.aab
            android/app-release-signed.apk
          if-no-files-found: warn
          retention-days: 14
