name: Diag Diarization

# Temporary: verifies Deepgram speaker diarization across model/language configs
# on a known multi-speaker sample. Runs on push to the fix branch only.
on:
  push:
    branches: [fix/nova3-diarization]

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Download a known multi-speaker sample
        run: |
          set -e
          for u in \
            https://dpgr.am/spacewalk.wav \
            https://static.deepgram.com/examples/interview_speech-analytics.wav \
            https://static.deepgram.com/examples/nasa-spacewalk-interview.wav ; do
            echo "trying $u"
            if curl -fsSL "$u" -o sample.wav && [ "$(stat -c%s sample.wav)" -gt 10000 ]; then
              echo "downloaded $u ($(stat -c%s sample.wav) bytes)"; break
            fi
          done
          ls -la sample.wav

      - name: Probe Deepgram configs
        env:
          DG: ${{ secrets.DEEPGRAM_API_KEY }}
        run: |
          probe() {
            label="$1"; qs="$2"
            echo "==================================================="
            echo "$label"
            echo "  $qs"
            code=$(curl -s -o resp.json -w '%{http_code}' -X POST \
              "https://api.deepgram.com/v1/listen?$qs" \
              -H "Authorization: Token $DG" \
              -H "Content-Type: audio/wav" \
              --data-binary @sample.wav)
            echo "  HTTP $code"
            if [ "$code" != "200" ]; then
              echo "  RESPONSE:"; jq -c '{err_code,err_msg,error,message}' resp.json 2>/dev/null || head -c 300 resp.json
              echo; return
            fi
            n=$(jq '[.results.channels[0].alternatives[0].words[].speaker] | unique | length' resp.json)
            ids=$(jq -c '[.results.channels[0].alternatives[0].words[].speaker] | unique' resp.json)
            lang=$(jq -r '.results.channels[0].detected_language // "n/a"' resp.json)
            echo "  distinct speakers: $n   speaker ids: $ids   detected_language: $lang"
          }
          probe "FIX  → nova-3 + language=multi + diarize" \
            "model=nova-3&diarize=true&smart_format=true&punctuate=true&language=multi"
          probe "BUG  → nova-2 + detect_language + diarize" \
            "model=nova-2&diarize=true&smart_format=true&punctuate=true&detect_language=true"
          probe "CTRL → nova-3 + language=en + diarize" \
            "model=nova-3&diarize=true&smart_format=true&punctuate=true&language=en"
          echo "==================================================="
          echo "Expected: FIX and CTRL show >=2 speakers; BUG shows 1."
