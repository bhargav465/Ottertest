name: Diag diarization

on:
  push:
    branches: [diag/diarization]

permissions:
  id-token: write
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: ottertest-diag

      - name: Download recent recordings from S3
        run: |
          BUCKET=$(aws cloudformation describe-stacks --stack-name OttertestStack \
            --query "Stacks[0].Outputs[?OutputKey=='MediaBucketName'].OutputValue" \
            --output text)
          echo "Media bucket: $BUCKET"
          mkdir -p clips
          aws s3 ls "s3://$BUCKET/audio/" --recursive | sort | tail -4 | awk '{print $4}' > keys.txt
          echo "Recent audio keys:"; cat keys.txt
          i=0
          while read -r key; do
            [ -z "$key" ] && continue
            ext="${key##*.}"
            aws s3 cp "s3://$BUCKET/$key" "clips/clip_$i.$ext" || true
            i=$((i+1))
          done < keys.txt
          ls -la clips

      - name: Transcribe each with Deepgram configs
        env:
          DG: ${{ secrets.DEEPGRAM_API_KEY }}
        run: |
          probe() {
            file="$1"; label="$2"; qs="$3"; ct="$4"
            code=$(curl -s -o resp.json -w '%{http_code}' -X POST \
              "https://api.deepgram.com/v1/listen?$qs" \
              -H "Authorization: Token $DG" -H "Content-Type: $ct" \
              --data-binary @"$file")
            if [ "$code" != "200" ]; then
              echo "  [$label] HTTP $code"; head -c 300 resp.json; echo; return
            fi
            n=$(jq '[.results.channels[0].alternatives[0].words[].speaker] | unique | length' resp.json)
            dl=$(jq -r '.results.channels[0].detected_language // "n/a"' resp.json)
            echo "  [$label] distinct speakers: $n | detected_language: $dl"
            echo "  transcript: $(jq -r '.results.channels[0].alternatives[0].transcript' resp.json | head -c 220)"
          }
          for f in clips/*; do
            [ -e "$f" ] || continue
            ext="${f##*.}"
            case "$ext" in
              webm) ct="audio/webm";; mp4|m4a) ct="audio/mp4";; ogg) ct="audio/ogg";;
              wav) ct="audio/wav";; mp3) ct="audio/mpeg";; *) ct="audio/webm";; esac
            echo "==================== $f ($(stat -c%s "$f") bytes, ct=$ct) ===================="
            probe "$f" "nova-3 multi (DEPLOYED)" "model=nova-3&diarize=true&smart_format=true&punctuate=true&language=multi" "$ct"
            probe "$f" "nova-3 en"               "model=nova-3&diarize=true&smart_format=true&punctuate=true&language=en" "$ct"
            probe "$f" "nova-2 en"               "model=nova-2&diarize=true&smart_format=true&punctuate=true&language=en" "$ct"
          done
