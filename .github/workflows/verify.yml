name: Verify transcription

# Temporary: pushes a synthesized speech clip through the real pipeline and
# checks the transcript AND the AI summary come back.
on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region
        required: true
        default: us-east-1

permissions:
  id-token: write
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Discover resources
        id: res
        run: |
          FN=$(aws lambda list-functions \
            --query "Functions[?contains(FunctionName,'TranscribeFn')].FunctionName | [0]" \
            --output text)
          TABLE=$(aws lambda get-function-configuration --function-name "$FN" \
            --query "Environment.Variables.MEETINGS_TABLE" --output text)
          BUCKET=$(aws lambda get-function-configuration --function-name "$FN" \
            --query "Environment.Variables.MEDIA_BUCKET" --output text)
          echo "table=$TABLE" >> "$GITHUB_OUTPUT"
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "Function=$FN  Table=$TABLE  Bucket=$BUCKET"

      - name: Synthesize speech and upload (triggers the Lambda)
        id: up
        run: |
          sudo apt-get update -y >/dev/null && sudo apt-get install -y espeak-ng >/dev/null
          espeak-ng -w speech.wav "Hello team. For the launch, I will finish the report by Friday. Priya will email the customer. We agreed to ship on Monday."
          ID="verify-$(date +%s)"
          echo "id=$ID" >> "$GITHUB_OUTPUT"
          aws s3 cp speech.wav "s3://${{ steps.res.outputs.bucket }}/audio/verifytester/$ID.wav"
          echo "Uploaded audio/verifytester/$ID.wav"

      - name: Poll DynamoDB for transcript + summary
        run: |
          TABLE="${{ steps.res.outputs.table }}"
          ID="${{ steps.up.outputs.id }}"
          for i in $(seq 1 25); do
            sleep 8
            ITEM=$(aws dynamodb get-item --table-name "$TABLE" \
              --key "{\"userId\":{\"S\":\"verifytester\"},\"meetingId\":{\"S\":\"$ID\"}}" \
              --output json 2>/dev/null || echo '{}')
            ST=$(echo "$ITEM" | jq -r '.Item.status.S // "PENDING"')
            HAS_SUMMARY=$(echo "$ITEM" | jq -r 'if .Item.summary then "yes" else "no" end')
            echo "poll $i: status=$ST summary=$HAS_SUMMARY"
            if [ "$ST" = "DONE" ]; then
              echo "=== TRANSCRIPT ==="
              echo "$ITEM" | jq -r '.Item.transcript.S // ""'
              echo "=== SUMMARY (tldr) ==="
              echo "$ITEM" | jq -r '.Item.summary.M.tldr.S // "(no summary — is GROQ_API_KEY set?)"'
              echo "=== ACTION ITEMS ==="
              echo "$ITEM" | jq -r '(.Item.summary.M.actionItems.L // []) | .[] | "- [\(.M.owner.S // "?")] \(.M.task.S // "")"'
              echo "VERIFY_OK (summary=$HAS_SUMMARY)"
              exit 0
            fi
            if [ "$ST" = "FAILED" ]; then
              echo "=== ERROR ==="
              echo "$ITEM" | jq -r '.Item.error.S // ""'
              echo "VERIFY_FAILED"
              exit 1
            fi
          done
          echo "VERIFY_TIMEOUT"
          exit 1
